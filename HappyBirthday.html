<!DOCTYPE html>  
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Wywy 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.active {
    display: flex;
    animation: fade 1s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes breathe {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.03); }
    100% { transform: scale(1); }
}

#screen2.active {
    animation: breathe 6s ease-in-out infinite;
    animation-delay: 1s;
}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    opacity: 0.6;
    cursor: pointer;
}

.confetti {
    position: absolute;
    width: 6px;
    height: 12px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

.flags-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
}

.line-wrap {
    position: relative;
    padding-top: 12px;
}

.string {
    position: absolute;
    top: 0;
    width: 100%;
    height: 20px;
    transform-origin: center;
}

.string path {
    stroke: rgba(255,255,255,0.4);
    stroke-width: 1.5;
    fill: none;
}

.stretch {
    animation: stretch 0.5s ease;
}

@keyframes stretch {
    0% { transform: scaleY(1); }
    40% { transform: scaleY(1.4); }
    100% { transform: scaleY(1); }
}

.flags {
    display: flex;
    justify-content: center;
    gap: 6px;
}

@keyframes drop {
    0% {
        transform: translateY(-120px) scaleY(1.3);
        opacity: 0;
    }
    60% {
        transform: translateY(12px) scaleY(0.9);
        opacity: 1;
    }
    80% {
        transform: translateY(-6px) scaleY(1.05);
    }
    100% {
        transform: translateY(0) scaleY(1);
    }
}

@keyframes swing {
    0% { transform: rotate(var(--r1)); }
    50% { transform: rotate(var(--r2)); }
    100% { transform: rotate(var(--r1)); }
}

.flag {
    width: 28px;
    height: 34px;
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-size: 14px;
    font-weight: bold;
    padding-top: 6px;

    animation: drop 1.2s cubic-bezier(.2,.8,.2,1) forwards, swing 3s ease-in-out infinite;
    transform-origin: top center;
}

.flag:nth-child(1){ --r1:-4deg; --r2:5deg; animation-delay:0s,1.2s;}
.flag:nth-child(2){ --r1:-3deg; --r2:4deg; animation-delay:0.05s,1.25s;}
.flag:nth-child(3){ --r1:-5deg; --r2:6deg; animation-delay:0.1s,1.3s;}
.flag:nth-child(4){ --r1:-4deg; --r2:5deg; animation-delay:0.15s,1.35s;}
.flag:nth-child(5){ --r1:-3deg; --r2:4deg; animation-delay:0.2s,1.4s;}
.flag:nth-child(6){ --r1:-4deg; --r2:6deg; animation-delay:0.25s,1.45s;}
.flag:nth-child(7){ --r1:-5deg; --r2:5deg; animation-delay:0.3s,1.5s;}
.flag:nth-child(8){ --r1:-3deg; --r2:4deg; animation-delay:0.35s,1.55s;}

#birthday .flag:nth-child(1){animation-delay:1.2s,1.8s;}
#birthday .flag:nth-child(2){animation-delay:1.25s,1.85s;}
#birthday .flag:nth-child(3){animation-delay:1.3s,1.9s;}
#birthday .flag:nth-child(4){animation-delay:1.35s,1.95s;}
#birthday .flag:nth-child(5){animation-delay:1.4s,2s;}
#birthday .flag:nth-child(6){animation-delay:1.45s,2.05s;}
#birthday .flag:nth-child(7){animation-delay:1.5s,2.1s;}
#birthday .flag:nth-child(8){animation-delay:1.55s,2.15s;}

.flag:nth-child(3n){background:#5dade2;}
.flag:nth-child(3n+1){background:#d7bde2;}
.flag:nth-child(3n+2){background:#f5b7b1;}

.button {
    margin-top: 40px;
    padding:12px 25px;
    background:#3498db;
    border:none;
    border-radius:25px;
    color:white;
    cursor:pointer;
}

.button:hover {
    box-shadow:0 0 15px #3498db;
}

/* TELA 3 */
.line {opacity:0; transition:1s; text-align:center;}
.show {opacity:1;}
.final {position:absolute; bottom:80px; opacity:0; transition:2s;}

/* ✍️ TYPEWRITER */
.typewriter {
    border-right: 2px solid white;
    white-space: pre-line;
    overflow: hidden;
    display: inline-block;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* espaçamento */
#l3 { margin-top: 25px; }
#l4 { margin-top: 25px; }

audio {display:none;}

</style>
</head>

<body>

<div id="screen1" class="screen active"></div>

<div id="screen2" class="screen">
<div class="flags-wrapper">

<div class="line-wrap">
<svg class="string" viewBox="0 0 200 20"><path d="M0 5 Q100 20 200 5" /></svg>
<div class="flags">
<div class="flag">H</div><div class="flag">A</div><div class="flag">P</div><div class="flag">P</div><div class="flag">Y</div><div class="flag">💜</div>
</div>
</div>

<div class="line-wrap">
<svg class="string" viewBox="0 0 260 20"><path d="M0 5 Q130 22 260 5" /></svg>
<div class="flags" id="birthday">
<div class="flag">B</div><div class="flag">I</div><div class="flag">R</div><div class="flag">T</div><div class="flag">H</div><div class="flag">D</div><div class="flag">A</div><div class="flag">Y</div>
</div>
</div>

</div>

<button class="button" onclick="goTo3()">clique aqui</button>
</div>

<div id="screen3" class="screen">

<div id="l1" class="line"></div>
<div id="l2" class="line"></div>
<div id="l3" class="line"></div>

<div id="l4" class="line" style="font-style:italic;"></div>

<div id="final" class="final">Made with 💜</div>

</div>

<div class="footer" onclick="alert('💜🩵')">
Developed by Byby 💜✨
</div>

<audio id="music" src="https://github.com/Gabi-Naa/Happy_birthday/blob/main/musica.mp3"></audio>
<audio id="plim" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>

/* CONFETTI */
for(let i=0;i<200;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,70%)`;
c.style.animationDuration=(2+Math.random()*3)+"s";
c.style.top = Math.random()*-100+"vh";
document.getElementById("screen1").appendChild(c);
}

/* TRANSIÇÃO */
setTimeout(()=>{
screen1.classList.remove("active");
screen2.classList.add("active");
},2500);

/* SOM */
setTimeout(()=>{document.querySelectorAll(".string")[0].classList.add("stretch"); plim.play();},400);
setTimeout(()=>{document.querySelectorAll(".string")[1].classList.add("stretch"); plim.play();},1600);

/* TYPEWRITER */
function typeWriter(el, text, speed, cb){
let i=0;
el.classList.add("typewriter");

function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,speed);
}else{
el.classList.remove("typewriter");
if(cb) cb();
}
}
t();
}

/* TELA 3 */
function goTo3(){
screen2.classList.remove("active");
screen3.classList.add("active");

let music=document.getElementById("music");
music.volume=0;
music.play();

let fade=setInterval(()=>{
if(music.volume<1) music.volume+=0.05;
else clearInterval(fade);
},200);

setTimeout(()=>{l1.classList.add("show"); typeWriter(l1,"It's funny when a baby dev falls in love...",40);},1000);
setTimeout(()=>{l2.classList.add("show"); typeWriter(l2,"…she builds things like this.",40);},3000);
setTimeout(()=>{l3.classList.add("show"); typeWriter(l3,"Feliz aniversário, Wywy 💙",45);},5000);
setTimeout(()=>{
l4.classList.add("show");
typeWriter(l4,`"Que o Senhor o abençoe e o proteja.
Que o Senhor olhe para você com favor e lhe mostre bondade.
Que o Senhor se agrade de você e lhe dê paz."
Números 6:24-26`,60);
},8000);

setTimeout(()=>final.style.opacity=1,20000);
}

</script>

</body>
</html>
